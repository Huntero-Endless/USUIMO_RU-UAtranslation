name: Update latest-data release

on:
  push:
    branches:
      - main
    paths:
      - 'data/**'
      - '.github/workflows/update-latest-data-release.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build data.zip
        run: |
          rm -rf package data.zip data.zip.sha256
          mkdir -p package
          cp -r data package/data
          cd package
          zip -r ../data.zip data
          cd ..
          sha256sum data.zip | awk '{print $1}' > data.zip.sha256

      - name: Ensure latest-data release exists
        id: ensure_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          API="https://api.github.com/repos/${{ github.repository }}"
          TAG="latest-data"

          STATUS=$(curl -s -o release.json -w "%{http_code}" \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API/releases/tags/$TAG")

          if [ "$STATUS" = "200" ]; then
            echo "Release exists."
          else
            echo "Creating release..."
            curl -s -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$API/releases" \
              -d @- > release.json <<EOF
          {
            "tag_name": "latest-data",
            "name": "Latest Data Package",
            "body": "Auto-updated data package for in-game silent updates.",
            "draft": false,
            "prerelease": false
          }
          EOF
          fi

          python3 - <<'PY' >> $GITHUB_OUTPUT
          import json
          with open("release.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          print(f"release_id={data['id']}")
          print(f"upload_url={data['upload_url'].split('{')[0]}")
          PY

      - name: Delete old assets if they exist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          API="https://api.github.com/repos/${{ github.repository }}"
          RELEASE_ID="${{ steps.ensure_release.outputs.release_id }}"

          curl -s -L \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$API/releases/$RELEASE_ID/assets" > assets.json

          python3 - <<'PY' > delete_assets.sh
          import json
          with open("assets.json", "r", encoding="utf-8") as f:
              assets = json.load(f)

          target_names = {"data.zip", "data.zip.sha256"}
          for asset in assets:
              if asset["name"] in target_names:
                  print(
                      "curl -s -L -X DELETE "
                      "-H \"Accept: application/vnd.github+json\" "
                      "-H \"Authorization: Bearer $GITHUB_TOKEN\" "
                      "-H \"X-GitHub-Api-Version: 2022-11-28\" "
                      f"\"https://api.github.com/repos/${{ github.repository }}/releases/assets/{asset['id']}\""
                  )
          PY

          if [ -s delete_assets.sh ]; then
            bash delete_assets.sh
          else
            echo "No old assets to delete."
          fi

      - name: Upload new data.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: application/zip" \
            "${{ steps.ensure_release.outputs.upload_url }}?name=data.zip" \
            --data-binary @data.zip

      - name: Upload new data.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -H "Content-Type: text/plain" \
            "${{ steps.ensure_release.outputs.upload_url }}?name=data.zip.sha256" \
            --data-binary @data.zip.sha256
